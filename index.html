<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHRASAL INBOX — 社内メール英語 句動詞辞典</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --paper:#ECEBE3;
  --panel:#FFFFFF;
  --ink:#1C2321;
  --muted:#726C5E;
  --hairline:#D9D4C6;
  --navy:#2B3A5C;
  --navy-dim:#4A5A7D;
  --mustard:#B9822A;
  --mustard-bg:#F3E7CD;
  --neutral-bg:#DDE3E0;
  --brick:#A8442E;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
}

.app{
  max-width:1180px;
  margin:0 auto;
  padding:28px 20px 60px;
}

/* ---------- Topbar ---------- */
.topbar{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
  border-bottom:3px solid var(--ink);
  padding-bottom:16px;
  margin-bottom:6px;
}
.wordmark{
  font-family:'Courier Prime', monospace;
  font-weight:700;
  font-size:26px;
  letter-spacing:0.5px;
  display:flex;
  align-items:center;
  gap:10px;
}
.wordmark .stamp-dot{
  width:12px;height:12px;border-radius:50%;
  background:var(--brick);
  display:inline-block;
  box-shadow:0 0 0 3px rgba(168,68,46,0.18);
}
.subtitle{
  font-size:13px;
  color:var(--muted);
  font-family:'Courier Prime',monospace;
  margin-top:2px;
}
.count-badge{
  font-family:'Courier Prime',monospace;
  font-size:12.5px;
  color:var(--navy);
  background:var(--neutral-bg);
  border:1px solid var(--hairline);
  padding:4px 10px;
  border-radius:3px;
  white-space:nowrap;
  align-self:center;
}

/* ---------- Search ---------- */
.searchwrap{
  margin:20px 0 22px;
}
.searchbox{
  width:100%;
  padding:13px 16px;
  font-size:15px;
  font-family:'Inter',sans-serif;
  border:1.5px solid var(--ink);
  border-radius:4px;
  background:var(--panel);
  color:var(--ink);
  outline:none;
}
.searchbox::placeholder{color:var(--muted);}
.searchbox:focus{border-color:var(--navy); box-shadow:0 0 0 3px rgba(43,58,92,0.12);}

/* ---------- Layout ---------- */
.layout{
  display:grid;
  grid-template-columns:200px 1fr;
  gap:24px;
  align-items:start;
}
@media (max-width:760px){
  .layout{grid-template-columns:1fr;}
}

/* ---------- Folders (sidebar) ---------- */
.folders{
  position:sticky;
  top:20px;
  display:flex;
  flex-direction:column;
  gap:2px;
}
.folders-label{
  font-family:'Courier Prime',monospace;
  font-size:11px;
  letter-spacing:1.5px;
  color:var(--muted);
  margin-bottom:8px;
  text-transform:uppercase;
}
.folder-btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border:none;
  background:transparent;
  border-radius:4px;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  font-size:13.5px;
  color:var(--ink);
  text-align:left;
  width:100%;
}
.folder-btn:hover{background:rgba(43,58,92,0.07);}
.folder-btn.active{
  background:var(--ink);
  color:var(--paper);
}
.folder-btn .n{
  font-family:'Courier Prime',monospace;
  font-size:11px;
  color:var(--muted);
  opacity:0.9;
}
.folder-btn.active .n{color:var(--paper); opacity:0.6;}

@media (max-width:760px){
  .folders{
    position:static;
    flex-direction:row;
    flex-wrap:wrap;
    gap:6px;
  }
  .folder-btn{width:auto;}
  .folders-label{display:none;}
}

/* ---------- Register legend ---------- */
.legend{
  display:flex;
  gap:14px;
  margin:18px 0 4px;
  font-size:12px;
  color:var(--muted);
  font-family:'Courier Prime',monospace;
  flex-wrap:wrap;
}
.legend span{display:flex;align-items:center;gap:6px;}
.legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

/* ---------- List ---------- */
.list{
  border-top:1px solid var(--hairline);
}
.row{
  border-bottom:1px solid var(--hairline);
  background:var(--panel);
  cursor:pointer;
  transition:background 0.15s ease;
}
.row:hover{background:#FAFAF6;}
.row-head{
  display:grid;
  grid-template-columns:14px 1fr auto auto;
  align-items:center;
  gap:14px;
  padding:13px 14px;
}
.reg-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--navy-dim);
  flex-shrink:0;
}
.reg-dot.casual{background:var(--mustard);}

.row-main{min-width:0;}
.row-verb{
  font-family:'Courier Prime',monospace;
  font-weight:700;
  font-size:15.5px;
  color:var(--ink);
}
.row-verb .car{color:var(--brick); margin-left:6px; font-size:12px;}
.row-preview{
  font-size:12.5px;
  color:var(--muted);
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.row-cat{
  font-family:'Courier Prime',monospace;
  font-size:10.5px;
  letter-spacing:0.5px;
  color:var(--navy);
  background:var(--neutral-bg);
  padding:4px 8px;
  border-radius:3px;
  white-space:nowrap;
  text-transform:uppercase;
}
.row-toggle{
  font-family:'Courier Prime',monospace;
  color:var(--muted);
  font-size:13px;
  width:16px;
  text-align:center;
}

.row-body{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.25s ease;
  background:#FBFAF6;
  border-top:1px dashed var(--hairline);
}
.row.open .row-body{max-height:400px;}
.row-body-inner{
  padding:16px 14px 20px 42px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.field-label{
  font-family:'Courier Prime',monospace;
  font-size:10.5px;
  letter-spacing:1px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:3px;
}
.meaning{font-size:14.5px; line-height:1.6;}
.example{
  font-size:14px;
  line-height:1.65;
  background:var(--panel);
  border-left:3px solid var(--navy);
  padding:9px 12px;
  border-radius:0 3px 3px 0;
}
.example b{color:var(--brick);}
.nuance{
  font-size:13.5px;
  line-height:1.6;
  color:#33392F;
}
.reg-line{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12.5px;
  color:var(--muted);
  font-family:'Courier Prime',monospace;
}

.no-results{
  padding:40px 10px;
  text-align:center;
  color:var(--muted);
  font-family:'Courier Prime',monospace;
  font-size:13px;
}

footer{
  margin-top:34px;
  padding-top:16px;
  border-top:1px solid var(--hairline);
  font-size:11.5px;
  color:var(--muted);
  font-family:'Courier Prime',monospace;
  text-align:center;
}
</style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div>
      <div class="wordmark"><span class="stamp-dot"></span>PHRASAL INBOX</div>
      <div class="subtitle">よく使う社内メール英語 — 句動詞リファレンス</div>
    </div>
    <div class="count-badge" id="countBadge">— verbs</div>
  </div>

  <div class="searchwrap">
    <input class="searchbox" id="search" type="text" placeholder="検索: 例) follow up / 催促 / 送る ...">
  </div>

  <div class="legend">
    <span><span class="dot" style="background:var(--navy-dim)"></span>ニュートラル(社外にも使える)</span>
    <span><span class="dot" style="background:var(--mustard)"></span>くだけた(社内・近しい相手向け)</span>
  </div>

  <div class="layout">
    <div class="folders" id="folders">
      <div class="folders-label">Folders</div>
    </div>

    <div>
      <div class="list" id="list"></div>
      <div class="no-results" id="noResults" style="display:none;">該当する句動詞が見つかりませんでした。</div>
    </div>
  </div>

  <footer>Ryu's personal reference — click a row to expand definition, example &amp; nuance</footer>
</div>

<script>
const DATA = [
  {v:"shoot over", cat:"依頼する", reg:"casual",
   meaning:"(メールなどで)さっと送る",
   example:"Could you <b>shoot over</b> the latest deck when you get a chance?",
   nuance:"send より軽くてカジュアル。社内の気心の知れた相手向け。"},
  {v:"reach out", cat:"依頼する", reg:"neutral",
   meaning:"連絡を取る、声をかける",
   example:"I'll <b>reach out</b> to the client directly to confirm timing.",
   nuance:"社外向けにも自然に使える定番表現。contact よりやわらかい印象。"},
  {v:"run (something) by (someone)", cat:"依頼する", reg:"neutral",
   meaning:"〜に確認してもらう、意見を聞く",
   example:"Let me <b>run this by</b> Andy before we send it out.",
   nuance:"最終判断の前に誰かに一度見てもらう、というニュアンス。"},
  {v:"bring up", cat:"依頼する", reg:"neutral",
   meaning:"話題に出す、切り出す",
   example:"I'll <b>bring up</b> the timeline issue on tomorrow's call.",
   nuance:"raise a topic のカジュアル版。会議前の予告として便利。"},
  {v:"back up", cat:"依頼する", reg:"casual",
   meaning:"(意見・立場を)支持する、後押しする",
   example:"Can you <b>back me up</b> on this in the meeting?",
   nuance:"「援護してほしい」という頼み方。社内限定のトーン。"},

  {v:"ask around", cat:"依頼する", reg:"casual",
   meaning:"周りに聞いてみる",
   example:"Let me <b>ask around</b> and see if anyone has the old file.",
   nuance:"特定の相手ではなく「誰かに聞いてみる」というカジュアルな表現。"},
  {v:"call on", cat:"依頼する", reg:"neutral",
   meaning:"(人を)指名する、頼る",
   example:"We may <b>call on</b> you to walk the board through the numbers.",
   nuance:"「いざという時に頼む」というやや改まったニュアンスも持つ。"},
  {v:"draw on", cat:"依頼する", reg:"neutral",
   meaning:"(経験・知識を)活用する",
   example:"We'll need to <b>draw on</b> James's geology background for this.",
   nuance:"人や資源の持つ経験・強みを引き出して使うイメージ。"},
  {v:"count on", cat:"依頼する", reg:"neutral",
   meaning:"頼りにする、あてにする",
   example:"We're <b>counting on</b> Blakes to turn this around by Friday.",
   nuance:"「頼りにしている」という信頼を伝える表現。依頼と感謝の中間的トーン。"},

  {v:"follow up", cat:"フォローアップ", reg:"neutral",
   meaning:"フォローする、追って確認する",
   example:"Just <b>following up</b> on the email I sent last week.",

  {v:"circle back", cat:"フォローアップ", reg:"neutral",
   meaning:"話を戻す、後で改めて確認する",

   nuance:"やや使われすぎな企業ジャーゴン気味だが依然よく使われる。"},
  {v:"check in", cat:"フォローアップ", reg:"neutral",
   meaning:"様子を確認する、進捗を聞く",
   example:"Wanted to <b>check in</b> on where things stand with Blakes.",

  {v:"touch base", cat:"フォローアップ", reg:"neutral",
   meaning:"軽く連絡を取る、簡単に確認し合う",
   example:"Can we <b>touch base</b> before the board call?",
   nuance:"短時間の確認・すり合わせを指すことが多い。"},
  {v:"catch up", cat:"フォローアップ", reg:"casual",
   meaning:"近況を共有する、追いつく",

  {v:"chase up", cat:"フォローアップ", reg:"neutral",

  {v:"keep tabs on", cat:"フォローアップ", reg:"casual",

  {v:"keep an eye on", cat:"フォローアップ", reg:"neutral",

  {v:"catch up on", cat:"フォローアップ", reg:"casual",
   meaning:"(遅れていることを)まとめて片付ける",
   example:"I need to <b>catch up on</b> emails after the closing.",
   nuance:"たまっていたものをまとめて処理する、というニュアンス。"},

  {v:"loop in", cat:"共有・連携", reg:"neutral",
   meaning:"(人を)話に加える、共有する",
   example:"Let's <b>loop in</b> Claude before we finalize this.",
   nuance:"CCに追加する、会話に招き入れるイメージ。"},
  {v:"loop out", cat:"共有・連携", reg:"casual",
   meaning:"(人を)話から外す",
   example:"We can <b>loop</b> the vendor <b>out</b> of this thread now.",

  {v:"flag", cat:"共有・連携", reg:"neutral",

  {v:"keep posted", cat:"共有・連携", reg:"neutral",

   example:"I'll <b>keep you posted</b> as soon as we hear from TTS.",
   nuance:"進捗報告の約束をするときの締め言葉として頻出。"},
  {v:"keep in the loop", cat:"共有・連携", reg:"neutral",

  {v:"hand off", cat:"共有・連携", reg:"neutral",
   meaning:"引き継ぐ、任せる",
   example:"I'll <b>hand this off</b> to Yutaka once the draft is ready.",
   nuance:"業務の受け渡し。delegate よりカジュアル。"},
  {v:"pass along", cat:"共有・連携", reg:"neutral",
   meaning:"(情報を)転送する、伝える",

  {v:"sync up", cat:"共有・連携", reg:"casual",
   meaning:"認識をすり合わせる",
   example:"Let's <b>sync up</b> before the call with Bernie.",
   nuance:"複数人の情報・認識を揃えるニュアンス。社内向け。"},

  {v:"fill in", cat:"共有・連携", reg:"neutral",
   meaning:"代役を務める / 詳細を伝える",
   example:"I'll <b>fill you in on</b> what was discussed on the call.",
   nuance:"欠席者に後から状況を伝える場面で頻出。"},
  {v:"team up", cat:"共有・連携", reg:"casual",
   meaning:"協力する、組む",
   example:"We're <b>teaming up</b> with Canaccord on the brokered tranche.",
   nuance:"partner withよりカジュアルで軽い響き。"},
  {v:"put (someone) in touch with", cat:"共有・連携", reg:"neutral",

  {v:"sign off on", cat:"承認・同意", reg:"neutral",

  {v:"point out", cat:"訂正・意見", reg:"neutral",

  {v:"clear up", cat:"訂正・意見", reg:"neutral",

  {v:"walk back", cat:"訂正・意見", reg:"neutral",

const REG_LABEL = { neutral: "ニュートラル", casual: "くだけた" };

function uniqueCats(){
  const set = [];
  DATA.forEach(d => { if(!set.includes(d.cat)) set.push(d.cat); });
  return set;
}

let activeFolder = "All";
let query = "";

function renderFolders(){
  const cats = uniqueCats();
  const container = document.getElementById('folders');
  container.innerHTML = '<div class="folders-label">Folders</div>';

  const makeBtn = (label, count, key) => {
    const btn = document.createElement('button');
    btn.className = 'folder-btn' + (activeFolder === key ? ' active' : '');
    btn.innerHTML = `<span>${label}</span><span class="n">${count}</span>`;
    btn.onclick = () => { activeFolder = key; renderFolders(); renderList(); };
    return btn;
  };

  container.appendChild(makeBtn('All', DATA.length, 'All'));
  cats.forEach(c => {
    const count = DATA.filter(d => d.cat === c).length;
    container.appendChild(makeBtn(c, count, c));
  });
}

function matchesQuery(item, q){
  if(!q) return true;
  const hay = (item.v + ' ' + item.meaning + ' ' + item.nuance + ' ' + item.cat).toLowerCase();
  return hay.includes(q.toLowerCase());
}

function renderList(){
  const list = document.getElementById('list');
  const noResults = document.getElementById('noResults');
  list.innerHTML = '';

  const filtered = DATA.filter(d =>
    (activeFolder === 'All' || d.cat === activeFolder) && matchesQuery(d, query)
  );

  document.getElementById('countBadge').textContent = filtered.length + ' verbs';

  if(filtered.length === 0){
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  filtered.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'row';

    row.innerHTML = `
      <div class="row-head">
        <span class="reg-dot ${item.reg}"></span>
        <div class="row-main">
          <div class="row-verb">${item.v}</div>
          <div class="row-preview">${item.meaning}</div>
        </div>
        <span class="row-cat">${item.cat}</span>
        <span class="row-toggle">+</span>
      </div>
      <div class="row-body">
        <div class="row-body-inner">
          <div>
            <div class="field-label">意味</div>
            <div class="meaning">${item.meaning}</div>
          </div>
          <div>
            <div class="field-label">例文</div>
            <div class="example">${item.example}</div>
          </div>
          <div>
            <div class="field-label">ニュアンス</div>
            <div class="nuance">${item.nuance}</div>
          </div>
          <div class="reg-line">
            <span class="reg-dot ${item.reg}"></span> ${REG_LABEL[item.reg]}
          </div>
        </div>
      </div>
    `;

    const head = row.querySelector('.row-head');
    head.addEventListener('click', () => {
      const isOpen = row.classList.contains('open');
      document.querySelectorAll('.row.open').forEach(r => {
        r.classList.remove('open');
        r.querySelector('.row-toggle').textContent = '+';
      });
      if(!isOpen){
        row.classList.add('open');
        row.querySelector('.row-toggle').textContent = '−';
      }
    });

    list.appendChild(row);
  });
}

document.getElementById('search').addEventListener('input', (e) => {
  query = e.target.value;
  renderList();
});

renderFolders();
renderList();
